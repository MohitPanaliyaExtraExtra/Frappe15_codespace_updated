version: "3.7"
services:
  mariadb:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed # Temporary fix for MariaDB 10.6
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      timeout: 10s
      retries: 10
    ports:
      - "3306:3306"

  # Enable PostgreSQL only if you use it, see development/README.md for more information.
  # postgresql:
  #   image: postgres:11.8
  #   environment:
  #     POSTGRES_PASSWORD: 123
  #   volumes:
  #     - postgresql-data:/var/lib/postgresql/data

  redis-cache:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  redis-queue:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6380:6379"

  redis-socketio:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6381:6379"

  frappe:
    image: frappe/bench:latest
    command: sleep infinity
    environment:
      - SHELL=/bin/bash
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace/frappe-bench
    ports:
      - 8000-8005:8000-8005
      - 9000-9005:9000-9005
    # Use default bridge network with explicit DNS for full outbound access
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      redis-socketio:
        condition: service_healthy

volumes:
  mariadb-data:
  postgresql-data:
